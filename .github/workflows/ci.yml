name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-x64:
    name: Build (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Detect available platform toolset
        id: toolset
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -property installationPath
          $vcDir = Join-Path $installPath "VC\Tools\MSVC"
          $latest = Get-ChildItem $vcDir -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $major = $latest.Name.Split('.')[0]
          $toolset = "v${major}0"
          Write-Host "Detected toolset: $toolset (from $($latest.Name))"
          echo "toolset=$toolset" >> $env:GITHUB_OUTPUT

      - name: Build
        shell: pwsh
        run: |
          msbuild.exe .\CheckCPUArch.vcxproj /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PlatformToolset=${{ steps.toolset.outputs.toolset }} `
            /p:OutDir="${{ github.workspace }}\out\x64\Release\"

      - name: Verify outputs
        shell: pwsh
        run: |
          dir "out\x64\Release\"
          if (!(Test-Path "out\x64\Release\CheckCPUArch.exe")) { throw "Missing EXE" }
          if (!(Test-Path "out\x64\Release\CheckCPUArch.pdb")) { throw "Missing PDB" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CheckCPUArch-x64-Release
          retention-days: 1
          path: |
            out\x64\Release\CheckCPUArch.exe
            out\x64\Release\CheckCPUArch.pdb

  build-arm64:
    name: Build (ARM64)
    runs-on: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Detect available platform toolset
        id: toolset
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -property installationPath
          $vcDir = Join-Path $installPath "VC\Tools\MSVC"
          $latest = Get-ChildItem $vcDir -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $major = $latest.Name.Split('.')[0]
          $toolset = "v${major}0"
          Write-Host "Detected toolset: $toolset (from $($latest.Name))"
          echo "toolset=$toolset" >> $env:GITHUB_OUTPUT

      - name: Build
        shell: pwsh
        run: |
          msbuild.exe .\CheckCPUArch.vcxproj /m `
            /p:Configuration=Release `
            /p:Platform=ARM64 `
            /p:PlatformToolset=${{ steps.toolset.outputs.toolset }} `
            /p:OutDir="${{ github.workspace }}\out\ARM64\Release\"

      - name: Verify outputs
        shell: pwsh
        run: |
          dir "out\ARM64\Release\"
          if (!(Test-Path "out\ARM64\Release\CheckCPUArch.exe")) { throw "Missing EXE" }
          if (!(Test-Path "out\ARM64\Release\CheckCPUArch.pdb")) { throw "Missing PDB" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CheckCPUArch-ARM64-Release
          retention-days: 1
          path: |
            out\ARM64\Release\CheckCPUArch.exe
            out\ARM64\Release\CheckCPUArch.pdb

  release:
    name: Update latest release
    needs: [build-x64, build-arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: CheckCPUArch-x64-Release
          path: artifacts/x64

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: CheckCPUArch-ARM64-Release
          path: artifacts/arm64

      - name: Package artifacts
        shell: bash
        run: |
          cd artifacts/x64 && zip -j ../../CheckCPUArch-x64.zip CheckCPUArch.exe CheckCPUArch.pdb && cd ../..
          cd artifacts/arm64 && zip -j ../../CheckCPUArch-ARM64.zip CheckCPUArch.exe CheckCPUArch.pdb && cd ../..

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          # Delete existing 'latest' release and tag if they exist
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          # Create new release with the build artifacts
          gh release create latest \
            --title "Latest Build" \
            --notes "Automatically updated from the last successful CI build on $(date -u '+%Y-%m-%d %H:%M UTC')." \
            --latest \
            CheckCPUArch-x64.zip \
            CheckCPUArch-ARM64.zip

